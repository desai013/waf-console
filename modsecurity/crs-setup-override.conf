# ==============================================================================
# OWASP CRS Setup Override — WAF Console
# ==============================================================================
# Fine-tunes the OWASP Core Rule Set for production use.
# ==============================================================================

# Paranoia Level:
# 1 = Default (balanced, low FP rate) — recommended for most sites
# 2 = Stricter detection, some FPs on complex apps
# 3 = Security-focused, higher FP rate
# 4 = Maximum — research/high-security environments only
SecAction \
  "id:900000,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.paranoia_level=1"

# Anomaly scoring thresholds (requests exceeding these are blocked in BLOCKING mode)
SecAction \
  "id:900110,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.inbound_anomaly_score_threshold=5,\
   setvar:tx.outbound_anomaly_score_threshold=4"

# Sampling percentage (100 = inspect all requests)
SecAction \
  "id:900400,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.sampling_percentage=100"

# -- Allowed methods -----------------------------------------------------------
SecAction \
  "id:900200,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:'tx.allowed_methods=GET HEAD POST PUT DELETE PATCH OPTIONS'"

# -- Max file/body sizes -------------------------------------------------------
SecAction \
  "id:900300,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.max_num_args=255,\
   setvar:tx.arg_name_length=100,\
   setvar:tx.arg_length=8000,\
   setvar:tx.total_arg_length=64000,\
   setvar:tx.max_file_size=1048576,\
   setvar:tx.combined_file_sizes=1048576"
