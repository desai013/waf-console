# ==============================================================================
# ModSecurity v3 — Override Configuration for WAF Console
# ==============================================================================
# This file is mounted into owasp/modsecurity-crs:nginx and overrides defaults.
# It enables JSON audit logging so the Node.js console can parse events.
# ==============================================================================

# -- Engine Mode ---------------------------------------------------------------
# Controlled per-site via dynamic conf in /etc/modsecurity.d/site-rules/
# Default: DetectionOnly (Node.js API switches to On when site goes BLOCKING)
SecRuleEngine DetectionOnly

# -- Request/Response Body -----------------------------------------------------
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

SecResponseBodyAccess Off

# -- Audit Logging (JSON format for Node.js parsing) ---------------------------
SecAuditEngine RelevantOnly
SecAuditLog /var/log/modsec/audit.json
SecAuditLogFormat JSON
SecAuditLogType Serial
SecAuditLogParts ABIJDEFHZ

# Log all 4xx and 5xx except 404
SecAuditLogRelevantStatus "^(?:5|4(?!04))"

# -- Debug Logging -------------------------------------------------------------
SecDebugLog /var/log/modsec/debug.log
SecDebugLogLevel 0

# -- Tmp/Upload dirs -----------------------------------------------------------
SecTmpDir /tmp/modsecurity
SecDataDir /tmp/modsecurity

# -- Custom Rules Directory ----------------------------------------------------
# Node.js writes whitelist, blacklist, and custom rule .conf files here.
# Nginx reloads automatically pick these up.
Include /etc/modsecurity.d/custom-rules/*.conf
Include /etc/modsecurity.d/site-rules/*.conf
