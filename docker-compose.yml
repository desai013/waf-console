# WAF Console — Production Docker Compose
# ============================================================
# Architecture:
#   nginx-waf (ModSecurity + OWASP CRS) :8080/:8443 → Backend
#   waf-console (Node.js control plane) :3000/:3001
#   redis                               (shared state)
#
# One command to start:
#   docker compose up -d
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # Volume init — runs as root to fix permissions on all shared
  # modsec volumes before nginx-waf and waf-console start.
  # Without this, nginx worker and node (both non-root) cannot
  # write to freshly-created Docker volumes owned by root.
  # ──────────────────────────────────────────────────────────
  modsec-init:
    image: busybox
    container_name: modsec-init
    restart: "no"
    user: root
    command: [
      "sh", "-c",
      "mkdir -p /var/log/modsec /etc/modsecurity.d/custom-rules /etc/modsecurity.d/site-rules &&
       touch /var/log/modsec/audit.json &&
       chmod 777 /var/log/modsec /etc/modsecurity.d/custom-rules /etc/modsecurity.d/site-rules &&
       chmod 666 /var/log/modsec/audit.json &&
       echo 'modsec volume permissions fixed'"
    ]
    volumes:
      - modsec-audit:/var/log/modsec
      - modsec-custom-rules:/etc/modsecurity.d/custom-rules
      - modsec-site-rules:/etc/modsecurity.d/site-rules
    networks:
      - waf_internal

  # ──────────────────────────────────────────────────────────
  # Nginx + ModSecurity + OWASP CRS — The Real WAF Engine
  # Official OWASP image: https://hub.docker.com/r/owasp/modsecurity-crs
  # ──────────────────────────────────────────────────────────
  nginx-waf:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: nginx-waf
    restart: unless-stopped
    ports:
      - "8080:8080"   # WAF Proxy HTTP  ← point your users' traffic here
      - "8443:8443"   # WAF Proxy HTTPS
    environment:
      # Backend — where clean traffic is forwarded after inspection
      # In production: override with your actual app, e.g. BACKEND=http://my-app:8000
      # In demo mode:  traffic proxies to the Client Console (port 3001)
      - BACKEND=${DEFAULT_BACKEND:-http://waf-console:3001}
      - PORT=8080
      - SSL_PORT=8443

      # ModSecurity engine mode (default: DetectionOnly — no customer disruption)
      # Override per-site via WAF Console UI (writes to modsecurity/site-rules/)
      - MODSECURITY_RULE_ENGINE=${WAF_MODE:-DetectionOnly}

      # Audit logging — JSON format so Node.js can parse it
      - MODSEC_AUDIT_LOG=/var/log/modsec/audit.json
      - MODSEC_AUDIT_LOG_FORMAT=JSON
      - MODSEC_AUDIT_LOG_PARTS=ABIJDEFHZ

      # CRS Paranoia Level (1=default, 2=stricter, 3=high security)
      - PARANOIA=${CRS_PARANOIA_LEVEL:-1}
      - ANOMALY_INBOUND=${CRS_ANOMALY_INBOUND:-5}
      - ANOMALY_OUTBOUND=${CRS_ANOMALY_OUTBOUND:-4}

      # Pass real client IPs when behind a load balancer
      - REAL_IP_HEADER=X-Forwarded-For
      - REAL_IP_RECURSIVE=on
      - REAL_IP_FROM=${TRUSTED_PROXY_CIDR:-10.0.0.0/8}
    volumes:
      # Shared audit log volume — nginx-waf writes, waf-console reads
      - modsec-audit:/var/log/modsec
      # Custom rules written by Node.js via modsec-rule-manager.js
      - modsec-custom-rules:/etc/modsecurity.d/custom-rules
      - modsec-site-rules:/etc/modsecurity.d/site-rules
      # NOTE: modsecurity-override.conf is configured via env vars above,
      #   NOT mounted as a file — the image's entrypoint writes this file
      #   itself and rejects external :ro mounts at that path.
    networks:
      - waf_internal
    depends_on:
      modsec-init:
        condition: service_completed_successfully
      waf-console:
        condition: service_started   # ensures waf-console hostname resolves before nginx starts
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # WAF Console — Node.js Control Plane
  # Analyst Console :3000 + Client Console :3001
  # ──────────────────────────────────────────────────────────
  waf-console:
    build: .                             # build from local source
    # image: desai013/waf-console:latest # uncomment to pull from Docker Hub instead
    container_name: waf-console
    restart: unless-stopped
    ports:
      - "3000:3000"   # Analyst Console ← admin only — FIREWALL from internet
      - "3001:3001"   # Client Console
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DB_DRIVER=sqlite
      - DB_PATH=/app/data/waf_events.db
      - WAF_MODE=${WAF_MODE:-DETECTION}

      # ModSecurity audit log path (shared volume — same path as nginx-waf writes to)
      - MODSEC_AUDIT_LOG=/var/log/modsec/audit.json

      # Rule directories (shared volumes — Node.js writes, nginx-waf reads)
      - MODSEC_RULES_DIR=/etc/modsecurity.d/custom-rules
      - MODSEC_SITE_RULES_DIR=/etc/modsecurity.d/site-rules

      # Nginx container name for reload command
      - NGINX_CONTAINER_NAME=nginx-waf

      # Optional integrations
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - LICENSE_KEY=${LICENSE_KEY:-}
      - TRUSTED_PROXY_COUNT=${TRUSTED_PROXY_COUNT:-1}
    volumes:
      - waf-data:/app/data
      - waf-logs:/app/logs
      # Shared volumes — same mounts as nginx-waf so Node.js can read/write
      - modsec-audit:/var/log/modsec
      - modsec-custom-rules:/etc/modsecurity.d/custom-rules
      - modsec-site-rules:/etc/modsecurity.d/site-rules
      # Docker socket so node can exec nginx reload (mount carefully in prod)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      modsec-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - waf_internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # Redis — Shared rate-limit state, pub/sub for live events
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: waf-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - waf_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  waf-data:              # Node.js SQLite DB, secrets, certs
  waf-logs:              # Node.js application logs
  redis-data:            # Redis persistence
  modsec-audit:          # ModSecurity JSON audit log (nginx writes, node reads)
  modsec-custom-rules:   # Whitelist/blacklist/custom rules (node writes, nginx reads)
  modsec-site-rules:     # Per-site WAF mode rules (node writes, nginx reads)

networks:
  waf_internal:
    driver: bridge
