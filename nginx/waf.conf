# ==============================================================================
# ModSecurity WAF — Production NGINX Configuration
# ==============================================================================
# This NGINX instance sits in front of the Node.js WAF and provides:
#   1. SSL/TLS Termination (Let's Encrypt)
#   2. CDN-like static asset caching
#   3. Fail-open routing (if Node crashes, traffic goes direct to origin)
#   4. Rate limiting at the edge
#   5. Security headers
#
# Architecture:
#   Client → NGINX (:80/:443) → Node.js WAF (:8080) → Origin Backend
#                                         ↓ (if down)
#                               NGINX → Origin Backend (fail-open)
#
# Ports:
#   80  - HTTP (redirects to HTTPS, serves ACME challenges)
#   443 - HTTPS (main traffic, proxied to Node WAF)
#   3000 - Analyst Console (proxied)
#   3001 - Client Console (proxied)
# ==============================================================================

# --- Rate Limiting Zone ---
# Limit each client IP to 30 requests/second (burst up to 60)
limit_req_zone $binary_remote_addr zone=waf_ratelimit:10m rate=30r/s;

# --- CDN-like Caching ---
proxy_cache_path /var/cache/nginx/waf_static
    levels=1:2
    keys_zone=waf_cache:50m
    max_size=2g
    inactive=60m
    use_temp_path=off;

# --- Upstream Backends ---
# Node.js WAF proxy (PM2 cluster handles internal load distribution)
# NOTE: Use Docker service name 'waf' for container networking
upstream waf_node {
    server waf:8080 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# Analyst Console
upstream analyst_console {
    server waf:3000 max_fails=3 fail_timeout=10s;
}

# Client Console
upstream client_console {
    server waf:3001 max_fails=3 fail_timeout=10s;
}

# ==============================================================================
# HTTP Server — Redirect to HTTPS + ACME challenge
# ==============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==============================================================================
# HTTPS Server — Main WAF Traffic Handler
# ==============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # --- SSL/TLS Configuration ---
    # Replace with your actual paths after running certbot
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Modern TLS only (TLSv1.2 + 1.3)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Rate Limiting ---
    limit_req zone=waf_ratelimit burst=60 nodelay;
    limit_req_status 429;

    # --- CDN-like Static Asset Caching ---
    # Intercept and cache static files so they NEVER hit Node.js
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        proxy_pass http://waf_node;
        proxy_cache waf_cache;
        proxy_cache_valid 200 30m;
        proxy_cache_valid 404 1m;
        proxy_cache_key "$scheme$host$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        add_header X-Cache-Status $upstream_cache_status always;
        expires 30d;
        access_log off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Main WAF Proxy (with Fail-Open) ---
    location / {
        proxy_pass http://waf_node;
        proxy_http_version 1.1;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # If Node.js is down, serve the fail-open page
        proxy_next_upstream error timeout http_502 http_503;
        error_page 502 503 504 = @failopen;

        # Pass real client info to WAF
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # WebSocket support for live feed
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Fail-Open Fallback ---
    # If Node.js WAF is completely down, NGINX returns a simple "WAF Bypassed" page
    # In a full deployment, you would add individual origin upstreams here
    location @failopen {
        default_type text/html;
        add_header X-WAF-Status "BYPASSED" always;
        return 200 '<!DOCTYPE html><html><head><title>Service Available</title></head><body><h1>Service is running</h1><p>WAF layer is temporarily bypassed for continuity.</p></body></html>';
    }
}

# ==============================================================================
# Analyst Console — HTTPS Proxy
# ==============================================================================
server {
    listen 443 ssl http2;
    server_name console.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Restrict analyst access by IP (uncomment and set your IPs)
    # allow 203.0.113.0/24;
    # deny all;

    location / {
        proxy_pass http://analyst_console;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ==============================================================================
# Client Console — HTTPS Proxy
# ==============================================================================
server {
    listen 443 ssl http2;
    server_name portal.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://client_console;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
