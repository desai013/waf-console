# ==============================================================================
# Nginx — WAF Console Proxy Config
# ==============================================================================
# Used with owasp/modsecurity-crs:nginx-alpine image.
# ModSecurity + OWASP CRS is built into the image and handles all inspection.
# This config handles backend proxying, security headers, and health endpoint.
# ==============================================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=waf_limit:10m rate=100r/s;

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name _;
    client_max_body_size 32m;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-WAF-Engine            "ModSecurity-CRS" always;

    # ── Health Endpoint (bypass ModSecurity, used by Docker healthcheck) ────
    location = /health {
        modsecurity off;
        access_log off;
        return 200 '{"status":"ok","engine":"modsecurity-crs"}';
        add_header Content-Type application/json;
    }

    # ── WAF Status endpoint (for Node.js to query engine state) ────────────
    location = /__waf_status {
        modsecurity off;
        access_log off;
        return 200 '{"modsecurity":"active","crs":"loaded"}';
        add_header Content-Type application/json;
    }

    # ── Rate limiting ───────────────────────────────────────────────────────
    limit_req zone=waf_limit burst=200 nodelay;
    limit_req_status 429;

    # ── Real IP from upstream proxy ─────────────────────────────────────────
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;

    # ── Pass real IP to backend ─────────────────────────────────────────────
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host              $host;
    proxy_http_version 1.1;
    proxy_set_header Connection        "";

    # Timeouts
    proxy_connect_timeout  5s;
    proxy_send_timeout     30s;
    proxy_read_timeout     30s;

    # ── Main Proxy ──────────────────────────────────────────────────────────
    location / {
        # BACKEND is set by owasp/modsecurity-crs image via environment variable
        # This is handled by the image's entrypoint — see docker-compose.yml
        proxy_pass ${BACKEND};
    }
}

# ── HTTPS (port 8443) — TLS termination ────────────────────────────────────
server {
    listen 8443 ssl default_server;
    listen [::]:8443 ssl default_server;
    server_name _;

    # Self-signed cert for now — replace with Let's Encrypt certs via ACME_ENABLED=true
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-WAF-Engine "ModSecurity-CRS" always;

    location = /health {
        modsecurity off;
        access_log off;
        return 200 '{"status":"ok","engine":"modsecurity-crs","tls":true}';
        add_header Content-Type application/json;
    }

    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Host              $host;

    location / {
        proxy_pass ${BACKEND};
    }
}
